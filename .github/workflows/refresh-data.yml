# Optional: weekly CMS data refresh — opens a PR with updated facilities.csv
name: Refresh CMS facility data

on:
  schedule:
    - cron: "0 12 * * 1"  # Mondays at 12:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas pgeocode

      - name: Refresh facilities from CMS
        run: python data_ingestion.py --refresh

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: refresh facility data from CMS"
          title: "Refresh CMS facility data"
          body: "Automated weekly update of `data/facilities.csv` from CMS Hospital Compare."
          branch: automated/cms-refresh